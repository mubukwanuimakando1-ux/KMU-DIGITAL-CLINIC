<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Patient Check-in</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><style>.gradient-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}</style></head>
<body class="bg-gray-100"><nav class="gradient-bg text-white shadow-lg p-4"><i class="fas fa-hospital-user"></i> KMU Health Center - Check-in</nav>
<div class="container mx-auto px-6 py-12"><div class="max-w-md mx-auto bg-white rounded-lg shadow-xl p-8"><h2 class="text-xl font-bold text-center mb-4">Enter Clinic Card Number</h2><form id="cardForm"><input type="text" id="clinicCard" placeholder="Clinic Card Number" class="w-full border rounded-lg p-3 text-center text-lg mb-4" required><button type="submit" class="w-full gradient-bg text-white py-3 rounded">Find Me</button></form></div></div>
<div id="patientModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"><div class="bg-white rounded-lg p-6 w-full max-w-md"><h3 class="text-xl font-bold mb-4">Confirm Your Details</h3><form id="checkinForm"><input type="text" id="fullName" placeholder="Full Name" class="w-full border rounded p-2 mb-2" required><input type="text" id="studentId" placeholder="Student/Staff ID" class="w-full border rounded p-2 mb-2" required><input type="number" id="age" placeholder="Age" class="w-full border rounded p-2 mb-2" required><select id="gender" class="w-full border rounded p-2 mb-2" required><option>Male</option><option>Female</option></select><textarea id="symptoms" placeholder="Symptoms" class="w-full border rounded p-2 mb-3" rows="3" required></textarea><button type="submit" class="w-full bg-green-600 text-white py-2 rounded">Submit</button></form></div></div>
<script>let patientId=null;
document.getElementById('cardForm').addEventListener('submit',async(e)=>{e.preventDefault();const{data}=await window.supabase.from('patients').select('*').eq('clinic_card',document.getElementById('clinicCard').value).single();if(data){patientId=data.id;document.getElementById('fullName').value=data.full_name||'';document.getElementById('studentId').value=data.student_id||'';document.getElementById('patientModal').classList.remove('hidden');}else alert('Card not found! See admin to register.');});
document.getElementById('checkinForm').addEventListener('submit',async(e)=>{e.preventDefault();const{count}=await window.supabase.from('visits').select('*',{count:'exact',head:true}).eq('visit_date',new Date().toISOString().split('T')[0]);const queuePos=(count||0)+1;await window.supabase.from('visits').insert([{patient_id:patientId,clinic_card:document.getElementById('clinicCard').value,full_name:document.getElementById('fullName').value,student_id:document.getElementById('studentId').value,age:parseInt(document.getElementById('age').value),gender:document.getElementById('gender').value,symptoms:document.getElementById('symptoms').value,status:'waiting',queue_position:queuePos,visit_date:new Date().toISOString().split('T')[0],check_in_time:new Date()}]);await window.supabase.from('notifications').insert([{title:'New Patient',message:`${document.getElementById('fullName').value} (Queue #${queuePos}) waiting`,type:'checkin',priority:'high',target_role:'nurse',is_global:true,created_at:new Date()}]);alert(`Queue #${queuePos}. Wait to be called.`);window.location.href='index.html';});</script>
</body>
</html>
