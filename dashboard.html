<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMU Health System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body.dark-mode { background-color: #1a1a2e; }
        body.dark-mode .bg-white, body.dark-mode .bg-gray-50, body.dark-mode .bg-gray-100 { background-color: #16213e; color: #eee; }
        body.dark-mode .border { border-color: #2d2d44; }
        .new-record { background-color: #d1fae5; border-left: 4px solid #10b981; }
        .old-record { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        body.dark-mode .new-record { background-color: #064e3b; }
        body.dark-mode .old-record { background-color: #7f1d1d; }
        .tab-active { background-color: #7c3aed; color: white; }
        .tab-inactive { background-color: #e5e7eb; color: #4b5563; }
        body.dark-mode .tab-inactive { background-color: #1f2937; color: #9ca3af; }
        .toast-success { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast-error { position: fixed; bottom: 20px; right: 20px; background: #ef4444; color: white; padding: 12px 20px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <nav class="gradient-bg text-white shadow-lg sticky top-0 z-20">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-hospital-user text-2xl"></i>
                <span class="font-bold text-xl">KMU Health Center</span>
            </div>
            <div class="flex items-center space-x-3">
                <span id="userNameDisplay" class="text-sm"></span>
                <span id="userRoleBadge" class="px-2 py-1 bg-white bg-opacity-20 rounded-full text-xs"></span>
                <span id="notificationBadge" class="bg-red-500 text-white text-xs px-2 py-1 rounded-full ml-2 hidden">0</span>
                <button id="darkModeToggle" class="bg-white bg-opacity-20 px-2 py-1 rounded text-sm"><i class="fas fa-moon"></i></button>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6" id="mainContent">
        <div class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl text-purple-600"></i><p>Loading...</p></div>
    </div>

    <!-- Real-time Chat Modal -->
    <div id="chatModal" class="fixed bottom-4 right-4 w-80 bg-white rounded-lg shadow-xl z-30 hidden flex flex-col" style="height: 400px;">
        <div class="gradient-bg text-white p-3 rounded-t-lg flex justify-between"><span><i class="fas fa-comments mr-2"></i>Staff Chat</span><button onclick="toggleChat()" class="text-white">×</button></div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50" style="height: 300px;"></div>
        <div class="p-2 border-t flex"><input type="text" id="chatInput" placeholder="Message..." class="flex-1 border rounded p-1 text-sm" onkeypress="if(event.key==='Enter') sendChatMessage()"><button onclick="sendChatMessage()" class="bg-purple-600 text-white px-3 py-1 rounded ml-1 text-sm">Send</button></div>
    </div>
    <button onclick="toggleChat()" class="fixed bottom-4 right-4 bg-purple-600 text-white p-3 rounded-full shadow-lg z-20"><i class="fas fa-comments"></i></button>

    <script>
        let currentUser = null;
        let notificationInterval = null;

        window.addEventListener('DOMContentLoaded', async () => {
            const userData = localStorage.getItem('currentUser');
            if (!userData) { window.location.href = 'index.html'; return; }
            currentUser = JSON.parse(userData);
            document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user-circle mr-1"></i>${currentUser.full_name}`;
            document.getElementById('userRoleBadge').textContent = currentUser.role.toUpperCase();
            
            setupRealtimeNotifications();
            setupRealtimeChat();
            
            if (currentUser.role === 'admin') await loadAdminDashboard();
            else if (currentUser.role === 'nurse') await loadNurseDashboard();
            else if (currentUser.role === 'doctor') await loadDoctorDashboard();
            else if (currentUser.role === 'pharmacist') await loadPharmacistDashboard();
            
            if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
            document.getElementById('darkModeToggle').onclick = () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            };
        });

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = isError ? 'toast-error' : 'toast-success';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function logActivity(userId, action, details) {
            try {
                if (!window.supabase) return;
                await window.supabase.from('activity_logs').insert([{ user_id: userId, action: action, details: details, timestamp: new Date() }]);
            } catch (e) { console.log('Log error:', e); }
        }

        async function logout() {
            await logActivity(currentUser.id, 'Logout', 'User logged out');
            if (notificationInterval) clearInterval(notificationInterval);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // ============ NOTIFICATIONS ============
        function setupRealtimeNotifications() {
            if (!window.supabase) return;
            window.supabase.channel('notifications')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `target_role=eq.${currentUser.role}` }, (payload) => {
                    showNotificationToast(payload.new);
                    updateNotificationBadge();
                })
                .subscribe();
            updateNotificationBadge();
            notificationInterval = setInterval(updateNotificationBadge, 10000);
        }

        async function updateNotificationBadge() {
            if (!window.supabase) return;
            const { count } = await window.supabase.from('notifications').select('*', { count: 'exact', head: true }).eq('target_role', currentUser.role).eq('is_read', false);
            const badge = document.getElementById('notificationBadge');
            if (badge) {
                if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
                else { badge.classList.add('hidden'); }
            }
        }

        function showNotificationToast(notif) {
            const toast = document.createElement('div');
            toast.className = `fixed top-20 right-4 ${notif.priority === 'high' ? 'bg-red-500' : 'bg-purple-600'} text-white p-3 rounded-lg shadow-lg z-50`;
            toast.innerHTML = `<strong>${notif.title}</strong><br><small>${notif.message}</small>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
            const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.play().catch(e => console.log('Sound blocked'));
        }

        // ============ CHAT ============
        function setupRealtimeChat() {
            if (!window.supabase) return;
            window.supabase.channel('chat')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, () => loadChatMessages())
                .subscribe();
            loadChatMessages();
        }

        async function loadChatMessages() {
            if (!window.supabase) return;
            const { data } = await window.supabase.from('chat_messages').select('*, users(full_name)').order('created_at', { ascending: true }).limit(50);
            const container = document.getElementById('chatMessages');
            if (container) {
                container.innerHTML = data?.map(m => `<div class="${m.user_id === currentUser.id ? 'text-right' : 'text-left'}"><span class="inline-block p-2 rounded-lg ${m.user_id === currentUser.id ? 'bg-purple-600 text-white' : 'bg-gray-300'}">${m.user_id !== currentUser.id ? `<b>${m.users?.full_name}</b><br>` : ''}${m.message}<br><small class="text-xs opacity-75">${new Date(m.created_at).toLocaleTimeString()}</small></span></div>`).join('') || '<div class="text-center text-gray-500">No messages</div>';
                container.scrollTop = container.scrollHeight;
            }
        }

        async function sendChatMessage() {
            const msg = document.getElementById('chatInput')?.value.trim();
            if (!msg) return;
            await window.supabase.from('chat_messages').insert([{ user_id: currentUser.id, message: msg, created_at: new Date() }]);
            document.getElementById('chatInput').value = '';
            loadChatMessages();
        }

        function toggleChat() { document.getElementById('chatModal').classList.toggle('hidden'); loadChatMessages(); }

        // ============ ADMIN DASHBOARD WITH SEPARATE FORMS ============
        async function loadAdminDashboard() {
            document.getElementById('mainContent').innerHTML = `
                <div class="flex gap-2 mb-4 flex-wrap">
                    <button onclick="adminShowTab('staff')" id="tabStaff" class="px-4 py-2 rounded tab-active">👨‍⚕️ Register Staff</button>
                    <button onclick="adminShowTab('student')" id="tabStudent" class="px-4 py-2 rounded tab-inactive">🎓 Register Student</button>
                    <button onclick="adminShowTab('inventory')" id="tabInventory" class="px-4 py-2 rounded tab-inactive">💊 Stock</button>
                    <button onclick="adminShowTab('logs')" id="tabLogs" class="px-4 py-2 rounded tab-inactive">📋 Activity Logs</button>
                    <button onclick="adminShowTab('reports')" id="tabReports" class="px-4 py-2 rounded tab-inactive">📊 Reports</button>
                </div>
                
                <!-- STAFF REGISTRATION FORM (Admin, Nurse, Doctor, Pharmacist only) -->
                <div id="adminStaffPanel" class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-bold mb-4">Register Staff (Admin, Nurse, Doctor, Pharmacist)</h2>
                    <form id="registerStaffForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input type="text" id="staffFullName" placeholder="Full Name *" class="border rounded p-2" required>
                            <input type="text" id="staffId" placeholder="Staff ID *" class="border rounded p-2" required>
                            <input type="email" id="staffEmail" placeholder="Email *" class="border rounded p-2" required>
                            <select id="staffRole" class="border rounded p-2" required>
                                <option value="">Select Role</option>
                                <option value="admin">Admin</option>
                                <option value="nurse">Nurse</option>
                                <option value="doctor">Doctor</option>
                                <option value="pharmacist">Pharmacist</option>
                            </select>
                            <input type="text" id="staffSecurityQuestion" placeholder="Security Question" class="border rounded p-2">
                            <input type="text" id="staffSecurityAnswer" placeholder="Security Answer" class="border rounded p-2">
                            <input type="password" id="staffPassword" placeholder="Password *" class="border rounded p-2" required>
                            <div class="md:col-span-2"><button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded w-full">Register Staff</button></div>
                        </div>
                    </form>
                    <hr class="my-6">
                    <h2 class="text-xl font-bold mb-4">All Staff Members</h2>
                    <div id="allStaffList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                </div>
                
                <!-- STUDENT REGISTRATION FORM (Full details) -->
                <div id="adminStudentPanel" class="bg-white rounded-lg shadow p-6 hidden">
                    <h2 class="text-xl font-bold mb-4">Register Student / Patient</h2>
                    <form id="registerStudentForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input type="text" id="studentFullName" placeholder="Full Name *" class="border rounded p-2" required>
                            <input type="text" id="studentId" placeholder="Student ID *" class="border rounded p-2" required>
                            <input type="email" id="studentEmail" placeholder="Email *" class="border rounded p-2" required>
                            <input type="text" id="studentClinicCard" placeholder="Clinic Card Number *" class="border rounded p-2" required>
                            <input type="text" id="studentProgram" placeholder="Program of Study" class="border rounded p-2">
                            <input type="text" id="studentYear" placeholder="Year of Study" class="border rounded p-2">
                            <input type="text" id="studentHostel" placeholder="Hostel & Room (e.g., W307A)" class="border rounded p-2">
                            <input type="number" id="studentAge" placeholder="Age" class="border rounded p-2">
                            <select id="studentGender" class="border rounded p-2">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                            <input type="text" id="studentPhone" placeholder="Phone Number" class="border rounded p-2">
                            <input type="password" id="studentPassword" placeholder="Password *" class="border rounded p-2" required>
                            <div class="md:col-span-2"><button type="submit" class="bg-green-600 text-white px-6 py-2 rounded w-full">Register Student</button></div>
                        </div>
                    </form>
                    <hr class="my-6">
                    <h2 class="text-xl font-bold mb-4">All Students</h2>
                    <div id="allStudentsList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                </div>
                
                <div id="adminInventoryPanel" class="bg-white rounded-lg shadow p-6 hidden"><h2 class="text-xl font-bold mb-4">Low Stock Alerts</h2><div id="lowStockList"></div><button onclick="showAddStockModal()" class="bg-green-600 text-white px-4 py-2 rounded mt-4">Add Medication</button></div>
                <div id="adminLogsPanel" class="bg-white rounded-lg shadow p-6 hidden"><h2 class="text-xl font-bold mb-4">Activity Log</h2><div id="activityLogList" class="space-y-2 max-h-96 overflow-y-auto"></div></div>
                <div id="adminReportsPanel" class="bg-white rounded-lg shadow p-6 hidden"><h2 class="text-xl font-bold mb-4">Download Reports</h2><button onclick="downloadPDF()" class="bg-red-600 text-white px-4 py-2 rounded m-1"><i class="fas fa-file-pdf"></i> PDF Report</button><button onclick="downloadWord()" class="bg-blue-600 text-white px-4 py-2 rounded m-1"><i class="fas fa-file-word"></i> Word Report</button></div>
            `;
            
            await loadAllStaff();
            await loadAllStudents();
            await loadLowStock();
            await loadActivityLogs();
            
            document.getElementById('registerStaffForm').addEventListener('submit', registerStaff);
            document.getElementById('registerStudentForm').addEventListener('submit', registerStudent);
        }

        // REGISTER STAFF (Separate function - NO student fields)
        async function registerStaff(e) {
            e.preventDefault();
            const userData = {
                full_name: document.getElementById('staffFullName').value,
                staff_id: document.getElementById('staffId').value,
                email: document.getElementById('staffEmail').value,
                role: document.getElementById('staffRole').value,
                security_question: document.getElementById('staffSecurityQuestion').value,
                security_answer: document.getElementById('staffSecurityAnswer').value,
                password: document.getElementById('staffPassword').value,
                status: 'active',
                created_at: new Date()
            };
            
            if (!userData.full_name || !userData.staff_id || !userData.email || !userData.role || !userData.password) {
                showToast('Please fill all required fields!', true);
                return;
            }
            
            const { error } = await window.supabase.from('users').insert([userData]);
            if (error) { showToast('Error: ' + error.message, true); return; }
            
            await logActivity(currentUser.id, 'Staff Registration', `Registered ${userData.full_name} as ${userData.role}`);
            showToast(`Staff ${userData.full_name} registered successfully!`);
            document.getElementById('registerStaffForm').reset();
            await loadAllStaff();
        }

        // REGISTER STUDENT (Separate function - ALL student fields)
        async function registerStudent(e) {
            e.preventDefault();
            const userData = {
                full_name: document.getElementById('studentFullName').value,
                staff_id: document.getElementById('studentId').value,
                email: document.getElementById('studentEmail').value,
                role: 'student',
                clinic_card: document.getElementById('studentClinicCard').value,
                program: document.getElementById('studentProgram').value,
                year_of_study: document.getElementById('studentYear').value,
                hostel_room: document.getElementById('studentHostel').value,
                age: document.getElementById('studentAge').value ? parseInt(document.getElementById('studentAge').value) : null,
                gender: document.getElementById('studentGender').value,
                phone: document.getElementById('studentPhone').value,
                password: document.getElementById('studentPassword').value,
                status: 'active',
                created_at: new Date()
            };
            
            if (!userData.full_name || !userData.staff_id || !userData.email || !userData.clinic_card || !userData.password) {
                showToast('Please fill all required fields!', true);
                return;
            }
            
            const { error } = await window.supabase.from('users').insert([userData]);
            if (error) { showToast('Error: ' + error.message, true); return; }
            
            await window.supabase.from('patients').insert([{
                clinic_card: userData.clinic_card,
                full_name: userData.full_name,
                student_id: userData.staff_id,
                program: userData.program,
                year_of_study: userData.year_of_study,
                hostel_room: userData.hostel_room,
                age: userData.age,
                gender: userData.gender,
                phone: userData.phone
            }]);
            
            await logActivity(currentUser.id, 'Student Registration', `Registered student ${userData.full_name}`);
            showToast(`Student ${userData.full_name} registered successfully!`);
            document.getElementById('registerStudentForm').reset();
            await loadAllStudents();
        }

        async function loadAllStaff() {
            const { data } = await window.supabase.from('users').select('*').in('role', ['admin', 'nurse', 'doctor', 'pharmacist']).order('created_at', { ascending: false });
            document.getElementById('allStaffList').innerHTML = data?.map(u => `<div class="border rounded p-2 flex justify-between items-center"><div><b>${u.full_name}</b><br><small>${u.email} | ${u.role} | ${u.status}</small></div><button onclick="toggleUserStatus('${u.id}','${u.status}')" class="bg-yellow-600 text-white px-2 py-1 rounded text-sm">Toggle Status</button></div>`).join('') || '<p>No staff found</p>';
        }

        async function loadAllStudents() {
            const { data } = await window.supabase.from('users').select('*').eq('role', 'student').order('created_at', { ascending: false });
            document.getElementById('allStudentsList').innerHTML = data?.map(u => `<div class="border rounded p-2"><div><b>${u.full_name}</b><br><small>ID: ${u.staff_id} | Card: ${u.clinic_card} | Program: ${u.program || 'N/A'} | Hostel: ${u.hostel_room || 'N/A'}</small></div><button onclick="toggleUserStatus('${u.id}','${u.status}')" class="bg-yellow-600 text-white px-2 py-1 rounded text-sm mt-1">Toggle Status</button></div>`).join('') || '<p>No students found</p>';
        }

        async function loadLowStock() {
            const { data } = await window.supabase.from('pharmacy_inventory').select('*').lte('current_stock', window.supabase.raw('minimum_stock'));
            document.getElementById('lowStockList').innerHTML = data?.map(i => `<div class="border rounded p-2 flex justify-between"><div><b>${i.medication_name}</b><br>Stock: ${i.current_stock} | Min: ${i.minimum_stock}</div><button onclick="restockItem('${i.id}')" class="bg-blue-600 text-white px-2 py-1 rounded">Restock</button></div>`).join('') || '<p>No low stock alerts</p>';
        }

        async function loadActivityLogs() {
            const { data } = await window.supabase.from('activity_logs').select('*, users(full_name)').order('timestamp', { ascending: false }).limit(50);
            document.getElementById('activityLogList').innerHTML = data?.map(log => `<div class="border-l-4 border-purple-600 bg-gray-50 p-2"><b>${log.users?.full_name || 'System'}</b> - ${log.action}<br><small>${new Date(log.timestamp).toLocaleString()}</small><br><span class="text-xs">${log.details || ''}</span></div>`).join('') || '<p>No logs yet</p>';
        }

        window.toggleUserStatus = async (id, current) => { 
            const newStatus = current === 'active' ? 'inactive' : 'active';
            await window.supabase.from('users').update({ status: newStatus }).eq('id', id);
            showToast(`User status changed to ${newStatus}`);
            loadAllStaff(); loadAllStudents();
        };
        
        window.restockItem = async (id) => { 
            let qty = prompt('Quantity to add:'); 
            if (qty) { await window.supabase.rpc('add_stock', { p_id: id, p_qty: parseInt(qty) }); loadLowStock(); showToast('Stock updated!'); }
        };

        function adminShowTab(tab) {
            document.getElementById('adminStaffPanel').classList.add('hidden');
            document.getElementById('adminStudentPanel').classList.add('hidden');
            document.getElementById('adminInventoryPanel').classList.add('hidden');
            document.getElementById('adminLogsPanel').classList.add('hidden');
            document.getElementById('adminReportsPanel').classList.add('hidden');
            document.getElementById(`admin${tab.charAt(0).toUpperCase() + tab.slice(1)}Panel`).classList.remove('hidden');
            
            ['Staff', 'Student', 'Inventory', 'Logs', 'Reports'].forEach(t => { 
                const btn = document.getElementById(`tab${t}`); 
                if (btn) btn.className = 'px-4 py-2 rounded tab-inactive'; 
            });
            const activeBtn = document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`);
            if (activeBtn) activeBtn.className = 'px-4 py-2 rounded tab-active';
        }

        window.showAddStockModal = () => {
            const name = prompt('Medication name:'); if(!name) return;
            const stock = prompt('Initial stock:'); if(!stock) return;
            const min = prompt('Minimum stock alert:'); if(!min) return;
            window.supabase.from('pharmacy_inventory').insert([{ medication_name: name, current_stock: parseInt(stock), minimum_stock: parseInt(min) }]);
            loadLowStock();
            showToast('Medication added!');
        };

        async function downloadPDF() {
            const { data: logs } = await window.supabase.from('activity_logs').select('*, users(full_name)').order('timestamp', { ascending: false });
            const element = document.createElement('div');
            element.innerHTML = `<h1>KMU Health Report</h1><p>Generated: ${new Date()}</p><table border="1"><tr><th>User</th><th>Action</th><th>Date</th></tr>${logs?.map(l => `<tr><td>${l.users?.full_name}</td><td>${l.action}</td><td>${new Date(l.timestamp).toLocaleString()}</td></tr>`).join('')}</table>`;
            html2pdf().from(element).save('KMU_Health_Report.pdf');
            showToast('PDF Downloaded');
        }
        function downloadWord() { alert('Word download ready'); }

        // ============ NURSE DASHBOARD (PRESERVED) ============
        async function loadNurseDashboard() {
            document.getElementById('mainContent').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-lg shadow p-4"><p class="text-gray-500">Waiting</p><p id="nurseWaitingCount" class="text-3xl font-bold text-cyan-600">0</p></div><div class="bg-white rounded-lg shadow p-4"><p class="text-gray-500">Checked Today</p><p id="nurseCheckedCount" class="text-3xl font-bold text-green-600">0</p></div><div class="bg-white rounded-lg shadow p-4"><p class="text-gray-500">With Doctor</p><p id="nurseDoctorCount" class="text-3xl font-bold text-purple-600">0</p></div></div>
                <div class="bg-white rounded-lg shadow p-6"><div class="flex justify-between mb-4"><h2 class="text-xl font-bold">Waiting Queue</h2><input type="text" id="searchQueue" placeholder="Search..." class="border rounded p-2 w-64" onkeyup="filterNurseQueue()"></div><div id="nurseQueueList" class="space-y-3 max-h-96 overflow-y-auto"></div></div>
                <div id="vitalsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"><div class="bg-white rounded-lg p-6 w-full max-w-lg"><h2 class="text-xl font-bold mb-4">Vitals Assessment</h2><div id="vitalsPatientInfo" class="bg-cyan-50 p-3 rounded mb-4"></div><form id="vitalsForm"><div class="grid grid-cols-2 gap-2 mb-3"><input type="number" id="temp" placeholder="Temperature" class="border rounded p-2" required><input type="text" id="bp" placeholder="BP" class="border rounded p-2" required><input type="number" id="hr" placeholder="Heart Rate" class="border rounded p-2" required><input type="number" id="weight" placeholder="Weight" class="border rounded p-2"></div><textarea id="complaint" placeholder="Chief Complaint" class="w-full border rounded p-2 mb-3" required></textarea><div class="flex gap-2"><button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Send to Doctor</button><button type="button" onclick="closeVitalsModal()" class="bg-gray-500 text-white px-4 py-2 rounded">Cancel</button></div></form></div></div>
            `;
            await loadNurseQueue();
            loadNurseStats();
            setInterval(() => { loadNurseQueue(); loadNurseStats(); }, 10000);
        }

        let currentNurseVisitId = null;
        async function loadNurseQueue() {
            const today = new Date().toISOString().split('T')[0];
            const { data: visits } = await window.supabase.from('visits').select('*').eq('status', 'waiting').eq('visit_date', today).order('queue_position', { ascending: true });
            document.getElementById('nurseWaitingCount').textContent = visits?.length || 0;
            if (!visits || visits.length === 0) { document.getElementById('nurseQueueList').innerHTML = '<div class="text-center text-gray-500 py-8">No patients waiting</div>'; return; }
            document.getElementById('nurseQueueList').innerHTML = visits.map(v => `<div class="border rounded p-3"><div class="flex justify-between"><div><span class="bg-cyan-100 text-cyan-800 text-xs px-2 py-1 rounded-full">Queue #${v.queue_position}</span><h3 class="font-bold mt-1">${v.full_name}</h3><p class="text-sm">Card: ${v.clinic_card} | Age: ${v.age}</p></div><button onclick="openNurseVitalsModal('${v.id}', '${v.full_name}', '${v.clinic_card}')" class="bg-cyan-600 text-white px-4 py-2 rounded">Take Vitals</button></div></div>`).join('');
        }

        async function loadNurseStats() {
            const today = new Date().toISOString().split('T')[0];
            const { count: checked } = await window.supabase.from('nurse_assessments').select('*', { count: 'exact', head: true }).gte('created_at', today);
            const { count: withDoctor } = await window.supabase.from('visits').select('*', { count: 'exact', head: true }).eq('status', 'nurse_checked').eq('visit_date', today);
            document.getElementById('nurseCheckedCount').textContent = checked || 0;
            document.getElementById('nurseDoctorCount').textContent = withDoctor || 0;
        }

        window.openNurseVitalsModal = (visitId, patientName, clinicCard) => {
            currentNurseVisitId = visitId;
            document.getElementById('vitalsPatientInfo').innerHTML = `<b>Patient:</b> ${patientName} | <b>Card:</b> ${clinicCard}`;
            document.getElementById('vitalsModal').classList.remove('hidden');
        };
        window.closeVitalsModal = () => document.getElementById('vitalsModal').classList.add('hidden');
        
        document.addEventListener('submit', async (e) => {
            if (e.target.id === 'vitalsForm') {
                e.preventDefault();
                await window.supabase.from('nurse_assessments').insert([{ visit_id: currentNurseVisitId, nurse_id: currentUser.id, temperature: parseFloat(document.getElementById('temp').value), blood_pressure: document.getElementById('bp').value, heart_rate: parseInt(document.getElementById('hr').value), weight: document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null, chief_complaint: document.getElementById('complaint').value, created_at: new Date() }]);
                await window.supabase.from('visits').update({ status: 'nurse_checked', nurse_check_time: new Date() }).eq('id', currentNurseVisitId);
                await window.supabase.from('notifications').insert([{ title: 'Patient Ready', message: 'Patient assessed, ready for doctor', type: 'ready', priority: 'high', target_role: 'doctor', is_global: true, created_at: new Date() }]);
                showToast('Patient sent to doctor!');
                closeVitalsModal();
                loadNurseQueue();
                loadNurseStats();
            }
        });
        
        window.filterNurseQueue = () => { const term = document.getElementById('searchQueue').value.toLowerCase(); document.querySelectorAll('#nurseQueueList .border').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(term) ? '' : 'none'; }); };

        // ============ DOCTOR DASHBOARD ============
        async function loadDoctorDashboard() {
            document.getElementById('mainContent').innerHTML = `
                <div class="bg-white rounded-lg shadow p-6"><h2 class="text-xl font-bold mb-4">Patients Ready for Consultation</h2><input type="text" id="searchDoctor" placeholder="Search..." class="border rounded p-2 w-64 mb-4" onkeyup="filterDoctorQueue()"><div id="doctorQueueList" class="space-y-3 max-h-96 overflow-y-auto"></div></div>
                <div id="consultModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"><div class="bg-white rounded-lg p-6 w-full max-w-lg"><h2 class="text-xl font-bold mb-4">Medical Consultation</h2><div id="consultPatient"></div><div class="mb-3"><label>Diagnosis</label><textarea id="diag" class="w-full border rounded p-2" rows="2" required></textarea></div><div class="mb-3"><label>Treatment</label><textarea id="treatment" class="w-full border rounded p-2" rows="2" required></textarea></div><div class="mb-3"><label>Medication</label><input type="text" id="meds" class="w-full border rounded p-2" placeholder="Medication name"></div><div class="mb-3"><label>Dosage</label><input type="text" id="dosage" class="w-full border rounded p-2" placeholder="Dosage instructions"></div><div class="flex gap-2"><button onclick="saveConsultation()" class="bg-green-600 text-white px-4 py-2 rounded">Send to Pharmacy</button><button onclick="closeConsultModal()" class="bg-gray-500 text-white px-4 py-2 rounded">Cancel</button></div></div></div>
            `;
            await loadDoctorQueue();
            setInterval(loadDoctorQueue, 10000);
        }

        let currentConsultVisitId = null;
        async function loadDoctorQueue() {
            const { data: visits } = await window.supabase.from('visits').select('*, nurse_assessments(*)').eq('status', 'nurse_checked').order('nurse_check_time', { ascending: true });
            if (!visits || visits.length === 0) { document.getElementById('doctorQueueList').innerHTML = '<div class="text-center text-gray-500 py-8">No patients ready</div>'; return; }
            document.getElementById('doctorQueueList').innerHTML = visits.map(v => `<div class="border rounded p-3"><div class="flex justify-between"><div><h3 class="font-bold">${v.full_name}</h3><p>Card: ${v.clinic_card}</p>${v.nurse_assessments?.[0] ? `<div class="bg-gray-50 p-2 mt-2 rounded"><b>Vitals:</b> Temp: ${v.nurse_assessments[0].temperature}°C | BP: ${v.nurse_assessments[0].blood_pressure}</div>` : ''}</div><button onclick="openDoctorConsultModal('${v.id}', '${v.full_name}')" class="bg-blue-600 text-white px-4 py-2 rounded">Consult</button></div></div>`).join('');
        }

        window.openDoctorConsultModal = (visitId, patientName) => {
            currentConsultVisitId = visitId;
            document.getElementById('consultPatient').innerHTML = `<div class="bg-blue-50 p-2 rounded mb-3"><b>Patient:</b> ${patientName}</div>`;
            document.getElementById('consultModal').classList.remove('hidden');
        };
        window.closeConsultModal = () => document.getElementById('consultModal').classList.add('hidden');
        
        window.saveConsultation = async () => {
            await window.supabase.from('consultations').insert([{ visit_id: currentConsultVisitId, doctor_id: currentUser.id, diagnosis: document.getElementById('diag').value, treatment_plan: document.getElementById('treatment').value, created_at: new Date() }]);
            await window.supabase.from('prescriptions').insert([{ visit_id: currentConsultVisitId, doctor_id: currentUser.id, medication_name: document.getElementById('meds').value, dosage: document.getElementById('dosage').value, status: 'pending', created_at: new Date() }]);
            await window.supabase.from('visits').update({ status: 'prescribed', doctor_consult_time: new Date() }).eq('id', currentConsultVisitId);
            await window.supabase.from('notifications').insert([{ title: 'New Prescription', message: 'Prescription ready for dispensing', type: 'prescription', priority: 'high', target_role: 'pharmacist', is_global: true, created_at: new Date() }]);
            showToast('Prescription sent to pharmacy!');
            closeConsultModal();
            loadDoctorQueue();
        };
        
        window.filterDoctorQueue = () => { const term = document.getElementById('searchDoctor').value.toLowerCase(); document.querySelectorAll('#doctorQueueList .border').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(term) ? '' : 'none'; }); };

        // ============ PHARMACIST DASHBOARD ============
        async function loadPharmacistDashboard() {
            document.getElementById('mainContent').innerHTML = `
                <div class="bg-white rounded-lg shadow p-6"><h2 class="text-xl font-bold mb-4">Pending Prescriptions</h2><div id="prescriptionsList" class="space-y-3 max-h-96 overflow-y-auto"></div></div>
                <div class="bg-white rounded-lg shadow p-6 mt-6"><h2 class="text-xl font-bold mb-4">Low Stock Alerts</h2><div id="pharmLowStockList" class="space-y-2"></div></div>
            `;
            await loadPharmacyPrescriptions();
            await loadPharmacyLowStock();
            setInterval(() => { loadPharmacyPrescriptions(); loadPharmacyLowStock(); }, 10000);
        }

        async function loadPharmacyPrescriptions() {
            const { data } = await window.supabase.from('prescriptions').select('*, visits(full_name, clinic_card)').eq('status', 'pending');
            if (!data || data.length === 0) { document.getElementById('prescriptionsList').innerHTML = '<div class="text-center text-gray-500 py-8">No pending prescriptions</div>'; return; }
            document.getElementById('prescriptionsList').innerHTML = data.map(p => `<div class="border rounded p-3"><div class="flex justify-between"><div><h3 class="font-bold">${p.medication_name}</h3><p>Patient: ${p.visits?.full_name}<br>Dosage: ${p.dosage}</p></div><button onclick="dispenseMedication('${p.id}')" class="bg-green-600 text-white px-4 py-2 rounded">Dispense</button></div></div>`).join('');
        }

        async function loadPharmacyLowStock() {
            const { data } = await window.supabase.from('pharmacy_inventory').select('*').lte('current_stock', window.supabase.raw('minimum_stock'));
            document.getElementById('pharmLowStockList').innerHTML = data?.map(i => `<div class="border rounded p-2 bg-red-50"><b>${i.medication_name}</b> - Stock: ${i.current_stock}<button onclick="restockPharmacy('${i.id}')" class="bg-blue-600 text-white px-2 py-1 rounded ml-2">Restock</button></div>`).join('') || '<p>All stock levels OK</p>';
        }

        window.dispenseMedication = async (id) => {
            const qty = prompt('Enter quantity dispensed:');
            if (qty) {
                await window.supabase.from('prescriptions').update({ status: 'dispensed', dispensed_by: currentUser.id, dispensed_at: new Date(), quantity_dispensed: parseInt(qty) }).eq('id', id);
                showToast('Medication dispensed!');
                loadPharmacyPrescriptions();
                loadPharmacyLowStock();
            }
        };
        
        window.restockPharmacy = async (id) => {
            const qty = prompt('Enter quantity to add:');
            if (qty) {
                await window.supabase.rpc('add_stock', { p_id: id, p_qty: parseInt(qty) });
                loadPharmacyLowStock();
                showToast('Stock updated!');
            }
        };
    </script>
</body>
</html>
