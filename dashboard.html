<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMU Health System - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/config.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Navigation -->
        <nav class="gradient-bg text-white shadow-lg">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-hospital-user text-2xl"></i>
                    <span class="font-bold text-xl">KMU Health Center</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userRole" class="px-3 py-1 bg-white bg-opacity-20 rounded-full text-sm"></span>
                    <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm transition">
                        <i class="fas fa-sign-out-alt mr-1"></i> Logout
                    </button>
                </div>
            </div>
        </nav>
        
        <!-- Main Content -->
        <div class="container mx-auto px-6 py-8">
            <!-- Welcome Card -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Welcome, <span id="userName"></span>!</h1>
                <p class="text-gray-600">You are logged in as <strong id="userRoleText"></strong></p>
            </div>
            
            <!-- Stats Cards -->
            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Login Status</p>
                            <p class="text-3xl font-bold text-green-600">✓ Active</p>
                        </div>
                        <i class="fas fa-check-circle text-4xl text-green-600 opacity-50"></i>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Your Role</p>
                            <p id="userRoleDisplay" class="text-3xl font-bold text-purple-600">-</p>
                        </div>
                        <i class="fas fa-user-shield text-4xl text-purple-600 opacity-50"></i>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">System Status</p>
                            <p class="text-3xl font-bold text-blue-600">Online</p>
                        </div>
                        <i class="fas fa-server text-4xl text-blue-600 opacity-50"></i>
                    </div>
                </div>
            </div>
            
            <!-- Quick Actions -->
            <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition cursor-pointer" onclick="alert('Feature coming soon!')">
                    <i class="fas fa-stethoscope text-3xl text-purple-600 mb-3"></i>
                    <h3 class="font-bold text-lg">Health Services</h3>
                    <p class="text-gray-600 text-sm">Access medical consultations</p>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition cursor-pointer" onclick="alert('Feature coming soon!')">
                    <i class="fas fa-prescription-bottle text-3xl text-blue-600 mb-3"></i>
                    <h3 class="font-bold text-lg">Pharmacy</h3>
                    <p class="text-gray-600 text-sm">Manage prescriptions</p>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition cursor-pointer" onclick="alert('Feature coming soon!')">
                    <i class="fas fa-chart-line text-3xl text-green-600 mb-3"></i>
                    <h3 class="font-bold text-lg">Health Records</h3>
                    <p class="text-gray-600 text-sm">View medical history</p>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition cursor-pointer" onclick="alert('Feature coming soon!')">
                    <i class="fas fa-calendar-check text-3xl text-orange-600 mb-3"></i>
                    <h3 class="font-bold text-lg">Appointments</h3>
                    <p class="text-gray-600 text-sm">Schedule visits</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get user from localStorage
        const userData = localStorage.getItem('currentUser');
        
        if (!userData) {
            console.log('No user found, redirecting to login');
            window.location.href = 'index.html';
        }
        
        const user = JSON.parse(userData);
        console.log('Dashboard loaded for:', user.full_name);
        
        // Display user information
        document.getElementById('userName').textContent = user.full_name;
        document.getElementById('userRoleText').textContent = user.role.toUpperCase();
        document.getElementById('userRoleDisplay').textContent = user.role.toUpperCase();
        document.getElementById('userRole').textContent = user.role.toUpperCase();
        
        // Logout function
        function logout() {
            console.log('Logging out user:', user.full_name);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        // Test Supabase connection (optional)
        if (typeof window.supabase !== 'undefined' && window.supabase) {
            console.log('✅ Supabase client available in dashboard');
        } else {
            console.log('⚠️ Supabase client not available');
        }
    </script>
</body>
</html>
